name: Publish Services to Docker Hub

on:
  push:
    branches: [ docker ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build and Push Dashboard Backend
        run: |
          echo "=== CONSTRUYENDO DASHBOARD BACKEND ==="
          docker build -t ${{ secrets.DOCKER_USERNAME }}/django_docker_dashboard_financial_backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/django_docker_dashboard_financial_backend:latest
          echo "✅ Api Django subido a: ${{ secrets.DOCKER_USERNAME }}/django_docker_dashboard_financial-backend:latest"

      - name: Build and Push Dashboard Frontend
        run: |
          echo "=== CONSTRUYENDO DASHBOARD FRONTEND ==="
          # Nombre CONSISTENTE con el patrón
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nextjs_docker_dashboard_financial_frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/nextjs_docker_dashboard_financial_frontend:latest
          echo "✅ Front Nextjs subido a: ${{ secrets.DOCKER_USERNAME }}/nextjs_docker_dashboard_financial_frontend:latest:latest"
