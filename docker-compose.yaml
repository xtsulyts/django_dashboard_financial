version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_dashboard
    environment:
      POSTGRES_DB: dashboardfinancial_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 90sdearcade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboardfinancial_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: xtsulyts/django_docker_dashboard_financial_backend:latest # Usa tu imagen de Docker Hub
    container_name: django_backend
    ports:
      - "8000:8000"
    environment:
      # 1. Usa las variables individuales, NO DATABASE_URL
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: dashboardfinancial_db
      DB_USER: postgres
      DB_PASSWORD: 90sdearcade
      DB_HOST: db # ⬅️ CONECTA AL CONTENEDOR 'db', NO A localhost
      DB_PORT: 5432
      # 2. La SECRET_KEY ahora es opcional. Si no se define, se generará automáticamente.
      #    Puedes agregarla aquí manualmente si lo deseas:
      # SECRET_KEY: 'django-insecure-7@-w=*(z&$hx@(^$u=9l%#kcmt8r60f4zcl4#_9czye5(xjw)h'
    depends_on:
      db:
        condition: service_healthy
    # Volúmenes locales eliminados. La imagen debe contener el código y el script de entrada.
    restart: unless-stopped
    # 3. Script de entrada que genera SECRET_KEY si no existe y ejecuta migraciones
    entrypoint: ["/bin/sh", "-c"]
    command: |
      if [ -z "$$SECRET_KEY" ]; then
        export SECRET_KEY=$$(python -c "import secrets; print(secrets.token_urlsafe(50))")
        echo "SECRET_KEY generada automáticamente."
      fi
      python manage.py migrate
      python manage.py runserver 0.0.0.0:8000

  frontend:
    image: xtsulyts/nextjs_docker_dashboard_financial_frontend:latest # Usa tu imagen de Docker Hub
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: